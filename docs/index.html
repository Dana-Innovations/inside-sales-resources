<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS Support Library & Resource Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text-primary: #1a1a18;
    --text-secondary: #5c5a54;
    --text-muted: #9e9c96;
    --accent: #00A3E2;
    --accent-light: #e6f6fc;
    --header-bg: #ffffff;
    --header-text: #1a1a18;
    --tag-new: #006fa1;
    --tag-new-bg: #e6f6fc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  header {
    background: var(--header-bg);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .header-left { display: flex; align-items: center; gap: 16px; }

  .header-logo-link {
    display: flex;
    align-items: center;
    text-decoration: none;
    opacity: 1;
    transition: opacity 0.15s;
  }
  .header-logo-link:hover { opacity: 0.8; }

  .header-logo {
    height: 32px;
    width: auto;
    display: block;
  }

  .header-title {
    font-size: 13px;
    font-weight: 400;
    color: #1a2a39;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-left: 16px;
    border-left: 1px solid #d0cec6;
    line-height: 1;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .search-wrap { position: relative; }

  .search-input {
    background: #f5f4f0;
    border: 1px solid #d0cec6;
    border-radius: 6px;
    padding: 7px 12px 7px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    width: 220px;
    outline: none;
    transition: border-color 0.2s, width 0.3s;
  }
  .search-input::placeholder { color: #a0a098; }
  .search-input:focus { border-color: var(--accent); width: 280px; }

  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: #a0a098; font-size: 13px; pointer-events: none;
  }

  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .nav-tab {
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    padding: 12px 16px; cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; text-transform: uppercase; letter-spacing: 0.08em;
    transition: color 0.15s, border-color 0.15s; font-family: 'DM Mono', monospace;
  }
  .nav-tab:hover { color: var(--text-primary); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 24px 32px 48px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .col-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .col-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

  .col-header {
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: #fafaf7;
  }

  .col-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-secondary);
    font-family: 'DM Mono', monospace; text-decoration: none;
  }
  a.col-title:hover { color: var(--accent); }

  .col-count {
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--text-muted); background: var(--border);
    padding: 2px 7px; border-radius: 10px;
  }

  .col-body { padding: 8px 0; }

  .col-item {
    display: block; padding: 6px 16px; font-size: 12.5px;
    color: var(--text-primary); text-decoration: none; line-height: 1.4;
    transition: background 0.12s, color 0.12s; cursor: pointer;
  }
  .col-item:hover { background: var(--accent-light); color: var(--accent); }

  .col-item.is-new { display: flex; align-items: center; gap: 6px; }

  .new-badge {
    font-size: 9px; font-family: 'DM Mono', monospace; font-weight: 500;
    color: var(--tag-new); background: var(--tag-new-bg);
    padding: 1px 5px; border-radius: 3px; letter-spacing: 0.05em; flex-shrink: 0;
  }

  .col-item-text { flex: 1; min-width: 0; white-space: normal; line-height: 1.35; }

  /* Multi-link rows */
  .col-item-multi { padding: 5px 16px 6px; }
  .col-item-multi:hover { background: var(--accent-light); }

  .col-item-multi-label {
    font-size: 12px; color: var(--text-secondary);
    display: block; padding-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .col-item-multi-links { display: flex; flex-wrap: wrap; gap: 4px; }

  .col-item-multi-link {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--accent); text-decoration: none;
    background: var(--accent-light); padding: 2px 8px;
    border-radius: 4px; transition: background 0.12s, color 0.12s; white-space: nowrap;
  }
  .col-item-multi-link:hover { background: var(--accent); color: #fff; }

  .see-more {
    display: block; padding: 6px 16px; font-size: 11px;
    font-family: 'DM Mono', monospace; color: var(--text-muted);
    cursor: pointer; transition: color 0.12s;
    border-top: 1px solid var(--border); margin-top: 4px;
  }
  .see-more:hover { color: var(--accent); }

  .col-item.pin-bottom-link {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 4px;
    padding-top: 8px;
  }
  .col-item.pin-bottom-link:hover { color: var(--accent); background: transparent; }

  .col-card.hidden { display: none; }
  .col-item.hidden, .col-item-multi.hidden { display: none; }

  .match-highlight {
    background: #fff0a0;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
    color: #1a2a39;
  }

  .col-card.search-match { border-left: 3px solid var(--accent); }

  .search-result-bar {
    display: none;
    padding: 7px 32px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    background: #fafaf7;
    border-bottom: 1px solid var(--border);
  }
  .search-result-bar.visible { display: block; }
  .search-result-bar strong { color: var(--accent); }

  .no-results {
    grid-column: 1/-1; text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 14px; display: none;
  }

  footer {
    text-align: center; padding: 20px; font-size: 11px;
    font-family: 'DM Mono', monospace; color: var(--text-muted);
    border-top: 1px solid var(--border); margin-top: 24px;
  }
</style>

// ── RENDER ENGINE ─────────────────────────────────────────────────
const PREVIEW_LIMIT = 10;

function buildNav() {
  const nav = document.getElementById('navTabs');
  REPOSITORY.forEach(col => {
    const tab = document.createElement('div');
    tab.className = 'nav-tab';
    tab.textContent = col.section;
    tab.onclick = () => filterSection(col.section, tab);
    nav.appendChild(tab);
  });
}

function buildGrid(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  data.forEach(col => {
    const card = document.createElement('div');
    card.className = 'col-card';
    card.dataset.section = col.section;
    const header = document.createElement('div');
    header.className = 'col-header';
    const titleEl = col.sectionUrl
      ? Object.assign(document.createElement('a'), { href: col.sectionUrl, target: '_blank', rel: 'noopener noreferrer', className: 'col-title', textContent: col.section })
      : Object.assign(document.createElement('span'), { className: 'col-title', textContent: col.section });
    const countEl = Object.assign(document.createElement('span'), { className: 'col-count', textContent: col.items.length });
    header.appendChild(titleEl);
    header.appendChild(countEl);
    const body = document.createElement('div');
    body.className = 'col-body';
    const showAll = col._showAll || false;
    const regular = col.items.filter(i => !i.pinBottom);
    const pinned  = col.items.filter(i => i.pinBottom);
    const visibleRegular = showAll ? regular : regular.slice(0, PREVIEW_LIMIT);
    const hiddenCount    = showAll ? 0 : regular.length - visibleRegular.length;
    const renderItem = (item) => {
      if (item.links && item.links.length) {
        const row = document.createElement('div');
        row.className = 'col-item-multi';
        row.dataset.label = item.label.toLowerCase();
        const lbl = Object.assign(document.createElement('span'), { className: 'col-item-multi-label', textContent: item.label });
        const linksWrap = document.createElement('div');
        linksWrap.className = 'col-item-multi-links';
        item.links.forEach(l => {
          const a = Object.assign(document.createElement('a'), { href: l.url, target: '_blank', rel: 'noopener noreferrer', className: 'col-item-multi-link', textContent: l.text });
          linksWrap.appendChild(a);
        });
        row.appendChild(lbl);
        row.appendChild(linksWrap);
        return row;
      } else {
        const a = document.createElement('a');
        a.href = item.url || '#';
        a.target = item.url && item.url !== '#' ? '_blank' : '_self';
        a.rel = 'noopener noreferrer';
        const classes = ['col-item'];
        const showNew = item.newUntil && new Date() <= new Date(item.newUntil);
        if (showNew) classes.push('is-new');
        if (item.pinBottom && !item.links) classes.push('pin-bottom-link');
        a.className = classes.join(' ');
        a.dataset.label = item.label.toLowerCase();
        a.innerHTML = showNew ? `<span class="new-badge">NEW</span><span class="col-item-text">${item.label}</span>` : `<span class="col-item-text">${item.label}</span>`;
        return a;
      }
    };
    visibleRegular.forEach(item => body.appendChild(renderItem(item)));
    if (hiddenCount > 0) {
      const more = document.createElement('span');
      more.className = 'see-more';
      more.textContent = `+ ${hiddenCount} more`;
      more.onclick = () => { col._showAll = true; buildGrid(REPOSITORY); };
      body.appendChild(more);
    }
    pinned.forEach(item => body.appendChild(renderItem(item)));
    card.appendChild(header);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

function filterSection(section, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  document.getElementById('resultBar').classList.remove('visible');
  document.getElementById('noResults').style.display = 'none';
  REPOSITORY.forEach(col => { col._showAll = false; });
  buildGrid(REPOSITORY);
  if (section !== 'all') {
    document.querySelectorAll('.col-card').forEach(card => {
      card.classList.toggle('hidden', card.dataset.section !== section);
    });
  }
}

function highlight(text, terms) {
  if (!terms.length) return text;
  const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp(`(${escaped.join('|')})`, 'gi');
  return text.replace(re, '<span class="match-highlight">$1</span>');
}

function scoreItem(label, sectionName, terms) {
  const lLabel = label.toLowerCase();
  const lSection = sectionName.toLowerCase();
  let score = 0;
  for (const t of terms) {
    if (lLabel.includes(t)) score += lLabel.startsWith(t) ? 3 : 2;
    if (lSection.includes(t)) score += 1;
  }
  return score;
}

function handleSearch(val) {
  const raw = val.trim().toLowerCase();
  const resultBar = document.getElementById('resultBar');
  const noResults = document.getElementById('noResults');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.nav-tab').classList.add('active');
  if (!raw) {
    REPOSITORY.forEach(col => { col._showAll = false; });
    buildGrid(REPOSITORY);
    resultBar.classList.remove('visible');
    noResults.style.display = 'none';
    return;
  }
  const terms = raw.split(/\s+/).filter(Boolean);
  let totalMatches = 0;
  const colMatches = REPOSITORY.map(col => {
    const matches = col.items.filter(item => {
      const lLabel = item.label.toLowerCase();
      const lSection = col.section.toLowerCase();
      return terms.every(t => lLabel.includes(t) || lSection.includes(t));
    });
    return { col, matches };
  }).filter(({ matches }) => matches.length > 0);
  totalMatches = colMatches.reduce((n, { matches }) => n + matches.length, 0);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (colMatches.length === 0) {
    noResults.style.display = 'block';
    document.getElementById('searchTerm').textContent = val;
    resultBar.classList.remove('visible');
    return;
  }
  noResults.style.display = 'none';
  resultBar.innerHTML = `<strong>${totalMatches}</strong> result${totalMatches !== 1 ? 's' : ''} across <strong>${colMatches.length}</strong> section${colMatches.length !== 1 ? 's' : ''} for "<strong>${val}</strong>" &nbsp;·&nbsp; Press <kbd style="background:#e8e6e0;padding:1px 5px;border-radius:3px;font-size:10px;">Esc</kbd> to clear`;
  resultBar.classList.add('visible');
  colMatches.sort((a, b) => b.matches.length - a.matches.length);
  colMatches.forEach(({ col, matches }) => {
    const card = document.createElement('div');
    card.className = 'col-card search-match';
    card.dataset.section = col.section;
    const header = document.createElement('div');
    header.className = 'col-header';
    const titleEl = col.sectionUrl
      ? Object.assign(document.createElement('a'), { href: col.sectionUrl, target: '_blank', rel: 'noopener noreferrer', className: 'col-title', textContent: col.section })
      : Object.assign(document.createElement('span'), { className: 'col-title', textContent: col.section });
    const countEl = Object.assign(document.createElement('span'), { className: 'col-count', textContent: matches.length });
    header.appendChild(titleEl);
    header.appendChild(countEl);
    const body = document.createElement('div');
    body.className = 'col-body';
    matches.slice().sort((a, b) => scoreItem(b.label, col.section, terms) - scoreItem(a.label, col.section, terms)).forEach(item => {
      if (item.links && item.links.length) {
        const row = document.createElement('div');
        row.className = 'col-item-multi';
        const lbl = document.createElement('span');
        lbl.className = 'col-item-multi-label';
        lbl.innerHTML = highlight(item.label, terms);
        const linksWrap = document.createElement('div');
        linksWrap.className = 'col-item-multi-links';
        item.links.forEach(l => {
          const a = Object.assign(document.createElement('a'), { href: l.url, target: '_blank', rel: 'noopener noreferrer', className: 'col-item-multi-link', textContent: l.text });
          linksWrap.appendChild(a);
        });
        row.appendChild(lbl);
        row.appendChild(linksWrap);
        body.appendChild(row);
      } else {
        const a = document.createElement('a');
        a.href = item.url || '#';
        a.target = item.url && item.url !== '#' ? '_blank' : '_self';
        a.rel = 'noopener noreferrer';
        const showNew = item.newUntil && new Date() <= new Date(item.newUntil);
        a.className = 'col-item' + (showNew ? ' is-new' : '');
        const labelHtml = highlight(item.label, terms);
        a.innerHTML = showNew ? `<span class="new-badge">NEW</span><span class="col-item-text">${labelHtml}</span>` : `<span class="col-item-text">${labelHtml}</span>`;
        body.appendChild(a);
      }
    });
    card.appendChild(header);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

const now = new Date();
const formatted = now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles', month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }).replace(',', '').replace(' at', '');
document.getElementById('footer').textContent = `Last Updated: ${formatted} PST`;

try {
  buildNav();
  buildGrid(REPOSITORY);
} catch(e) {
  document.getElementById('grid').innerHTML = `<div style="grid-column:1/-1;padding:40px;color:#c8351a;font-family:monospace;font-size:13px;">&#9888; Repository failed to load. Check for a formatting error in the data block.<br><br>Error: ${e.message}<br><br>Ensure all lines end with a comma and all brackets are intact.</div>`;
}
